# Vite 빌드(dist) → Firebase Hosting | /api/** 는 firebase.json 에서 Cloud Run(tax-automation) 으로 리라이트
#
# 인증: GitHub Secret `GCP_SA_KEY` (Cloud Run 워크플로와 동일 JSON).
# · `google-github-actions/auth` 는 유효한 서비스 계정 JSON 이어야 함.
# · `FIREBASE_SERVICE_ACCOUNT` 만 있고 비정형이면 auth 단계에서 실패할 수 있어, 검증된 GCP_SA_KEY 를 사용.
# · 해당 SA 에 Firebase Hosting Admin(또는 역할에 firebasehosting.admin) 이 있어야 deploy 가 성공합니다.

name: Deploy Firebase Hosting

on:
  push:
    branches:
      - master
    paths:
      - "firebase.json"
      - "src/**"
      - "index.html"
      - "vite.config.ts"
      - "package.json"
      - "package-lock.json"
      - "public/**"
      - ".github/workflows/deploy-firebase-hosting.yml"
  workflow_dispatch:

jobs:
  hosting:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cloud Run 배포와 동일 SA — FIREBASE_SERVICE_ACCOUNT 단독이 깨진 저장소에서도 동작
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK (firebase-tools 호환)
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: gen-lang-client-0127550748

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install & build (Vite → dist)
        env:
          VITE_VERCEL_API_ORIGIN: ${{ secrets.VITE_VERCEL_API_ORIGIN }}
        run: |
          npm ci
          npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Deploy to Firebase Hosting
        run: |
          set -euo pipefail
          firebase deploy --only hosting --project gen-lang-client-0127550748 --non-interactive
