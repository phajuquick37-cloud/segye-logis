# Vite 빌드(dist) → Firebase Hosting | /api/** 는 firebase.json 에서 Cloud Run(tax-automation) 으로 리라이트
# GitHub Secret: FIREBASE_SERVICE_ACCOUNT = GCP 서비스 계정 JSON 전체 (Hosting 배포·Run 연동 권한 필요)
# (구) FirebaseExtended/action-hosting-deploy 는 동일 시크릿에서 실패하는 경우가 있어 auth + firebase CLI 로 통일

name: Deploy Firebase Hosting

on:
  push:
    branches:
      - master
    paths:
      - "firebase.json"
      - "src/**"
      - "index.html"
      - "vite.config.ts"
      - "package.json"
      - "package-lock.json"
      - "public/**"
      - ".github/workflows/deploy-firebase-hosting.yml"
  workflow_dispatch:

jobs:
  hosting:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # firebase deploy 가 사용할 Application Default Credentials
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK (firebase-tools 호환)
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: gen-lang-client-0127550748

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install & build (Vite → dist)
        env:
          VITE_VERCEL_API_ORIGIN: ${{ secrets.VITE_VERCEL_API_ORIGIN }}
        run: |
          npm ci
          npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Deploy to Firebase Hosting
        run: |
          set -euo pipefail
          firebase deploy --only hosting --project gen-lang-client-0127550748 --non-interactive
