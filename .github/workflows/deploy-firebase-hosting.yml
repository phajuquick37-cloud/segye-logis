# Vite 빌드(dist) → Firebase Hosting | /api/** 만 Cloud Run(tax-automation)
# FIREBASE_SERVICE_ACCOUNT (GCP 서비스 계정 JSON) GitHub Secret 필요.
# 세계로지스.com DNS 는 Firebase Console → Hosting → 사용자 지정 도메인

name: Deploy Firebase Hosting

on:
  push:
    branches:
      - master
    paths:
      - "firebase.json"
      - "src/**"
      - "index.html"
      - "vite.config.ts"
      - "package.json"
      - "package-lock.json"
      - "public/**"
      - ".github/workflows/deploy-firebase-hosting.yml"
  workflow_dispatch:

jobs:
  hosting:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install & build (Vite → dist)
        env:
          # Firebase 호스팅 + Vercel API 병행 시: 예) https://프로젝트.vercel.app (sendMail/tax-run 프록시)
          VITE_VERCEL_API_ORIGIN: ${{ secrets.VITE_VERCEL_API_ORIGIN }}
        run: |
          npm ci
          npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: gen-lang-client-0127550748
          channelId: live
