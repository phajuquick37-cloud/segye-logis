name: Deploy to Cloud Run

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # GitHub에 넣은 SA 키(gcp_xxx@PROJECT.iam.gserviceaccount.com) 한 주체로
      # docker push + Cloud Run 배포. Cloud Build 기본 SA에 AR Writer를 줄 필요 없음.
      - name: Docker — 빌드 후 Artifact Registry에 푸시
        run: |
          set -e
          REG=asia-northeast3-docker.pkg.dev
          IMG=$REG/gen-lang-client-0127550748/tax-automation/tax-automation
          gcloud auth configure-docker "$REG" --quiet
          docker build -t "${IMG}:${{ github.sha }}" ./tax-invoice-automation
          docker push "${IMG}:${{ github.sha }}"

      # --update-env-vars 는 기존 Cloud Run 변수(IMAP 등)를 지우지 않고 병합합니다.
      - name: Cloud Run 배포
        env:
          TAX_COLLECT_SECRET: ${{ secrets.TAX_COLLECT_SECRET }}
        run: |
          set -e
          IMG=asia-northeast3-docker.pkg.dev/gen-lang-client-0127550748/tax-automation/tax-automation
          gcloud run deploy tax-automation \
            --image ${IMG}:${{ github.sha }} \
            --region=asia-northeast3 \
            --project=gen-lang-client-0127550748 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=2Gi \
            --cpu=2 \
            --timeout=3600s \
            --concurrency=1 \
            --min-instances=1 \
            --max-instances=1 \
            --update-env-vars="TAX_COLLECT_SECRET=${TAX_COLLECT_SECRET},TAX_EMAIL_SINCE_MIN=2026-04-10,TAX_INVOICE_SUBJECT_STRICT=true"
