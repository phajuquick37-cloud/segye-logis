name: Deploy to Cloud Run

# master 브랜치에 push 될 때마다 자동 실행
on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 가져오기
      - name: Checkout
        uses: actions/checkout@v4

      # 2. GCP 인증
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 3. gcloud 설정
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 4. Docker → Container Registry 인증
      - name: Configure Docker
        run: gcloud auth configure-docker --quiet

      # 5. Docker 이미지 빌드
      - name: Build Docker image
        run: |
          docker build \
            -f tax-invoice-automation/Dockerfile \
            -t gcr.io/gen-lang-client-0127550748/tax-automation:${{ github.sha }} \
            -t gcr.io/gen-lang-client-0127550748/tax-automation:latest \
            ./tax-invoice-automation

      # 6. 이미지 push
      - name: Push Docker image
        run: |
          docker push gcr.io/gen-lang-client-0127550748/tax-automation:${{ github.sha }}
          docker push gcr.io/gen-lang-client-0127550748/tax-automation:latest

      # 7. Cloud Run 배포
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy tax-automation \
            --image gcr.io/gen-lang-client-0127550748/tax-automation:${{ github.sha }} \
            --region asia-northeast3 \
            --platform managed \
            --no-allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --timeout 3600s \
            --concurrency 1 \
            --min-instances 0 \
            --max-instances 1 \
            --project gen-lang-client-0127550748
