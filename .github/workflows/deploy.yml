name: Deploy to Cloud Run

# master 브랜치에 push 될 때마다 자동 실행
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # GitHub 러너에서 AR로 `docker push`할 때 권한이 꼬이는 경우가 많아,
      # Google Cloud Build가 소스로 이미지를 빌드·푸시·배포하도록 --source 를 사용한다.
      # (콘솔: Cloud Build API, Cloud Run API, Artifact Registry API 활성화)
      - name: Deploy to Cloud Run (Cloud Build, Dockerfile in tax-invoice-automation/)
        env:
          TAX_COLLECT_SECRET: ${{ secrets.TAX_COLLECT_SECRET }}
        run: |
          gcloud run deploy tax-automation \
            --source=./tax-invoice-automation \
            --region=asia-northeast3 \
            --project=gen-lang-client-0127550748 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=2Gi \
            --cpu=2 \
            --timeout=3600s \
            --concurrency=1 \
            --min-instances=1 \
            --max-instances=1 \
            --set-env-vars="TAX_COLLECT_SECRET=${TAX_COLLECT_SECRET}" \
            --quiet
