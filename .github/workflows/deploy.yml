name: Deploy to Cloud Run

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # GitHub에 넣은 SA 키(gcp_xxx@PROJECT.iam.gserviceaccount.com) 한 주체로
      # docker push + Cloud Run 배포. Cloud Build 기본 SA에 AR Writer를 줄 필요 없음.
      - name: Docker — 빌드 후 Artifact Registry에 푸시
        run: |
          set -e
          REG=asia-northeast3-docker.pkg.dev
          IMG=$REG/gen-lang-client-0127550748/tax-automation/tax-automation
          gcloud auth configure-docker "$REG" --quiet
          docker build -t "${IMG}:${{ github.sha }}" ./tax-invoice-automation
          docker push "${IMG}:${{ github.sha }}"

      # 쉼표/따옴표가 섞인 TAX_COLLECT_SECRET 등은 CLI 한 줄 --update-env-vars에서 깨질 수 있음.
      # YAML 파일로 병합 업데이트(기존 IMAP·Firebase 등 콘솔 변수 유지).
      - name: Cloud Run 배포
        env:
          TAX_COLLECT_SECRET: ${{ secrets.TAX_COLLECT_SECRET }}
        run: |
          set -e
          IMG=asia-northeast3-docker.pkg.dev/gen-lang-client-0127550748/tax-automation/tax-automation
          python3 <<'PY'
          import os
          def q(v: str) -> str:
              s = v if v is not None else ""
              s = str(s)
              s = s.replace("\\", "\\\\").replace("\n", "\\n").replace("\r", "")
              s = s.replace('"', '\\"')
              return f'"{s}"'
          out = {
              "TAX_COLLECT_SECRET": os.environ.get("TAX_COLLECT_SECRET", "") or "",
              "TAX_EMAIL_SINCE_MIN": "2024-04-10",
              "TAX_INVOICE_SUBJECT_STRICT": "true",
              "TAX_SCHEDULE_INTERVAL_MINUTES": "60",
              "TAX_MAIL_LOOKBACK_DAYS": "30",
              "TAX_REQUIRE_ETAX_OR_NTS_SIGNAL": "true",
          }
          path = os.environ.get("CR_ENV_FILE", "/tmp/cr-env.yaml")
          with open(path, "w", encoding="utf-8") as f:
              for k, v in out.items():
                  f.write(f"{k}: {q(v)}\n")
          print("Wrote", path, "for keys:", list(out.keys()))
          PY
          gcloud run deploy tax-automation \
            --image ${IMG}:${{ github.sha }} \
            --region=asia-northeast3 \
            --project=gen-lang-client-0127550748 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=2Gi \
            --cpu=2 \
            --timeout=3600s \
            --concurrency=1 \
            --min-instances=1 \
            --max-instances=1 \
            --update-env-vars-file=/tmp/cr-env.yaml

      - name: Cloud Run public URL (Vercel에 넣을 값)
        run: |
          set -e
          echo "=== 복사: VITE_TAX_AUTOMATION_URL ==="
          gcloud run services describe tax-automation \
            --region=asia-northeast3 \
            --project=gen-lang-client-0127550748 \
            --format='value(status.url)'
          echo "==================================="
