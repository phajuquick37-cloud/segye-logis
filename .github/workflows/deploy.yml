name: Deploy to Cloud Run

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # 프로젝트·리전·Cloud Run 서비스명·AR Docker 저장소 베이스(콘솔과 동일해야 push/deploy 성공)
    env:
      GCP_PROJECT_ID: gen-lang-client-0127550748
      AR_REGION: asia-northeast3
      # Cloud Run 서비스 이름
      CLOUD_RUN_SERVICE: tax-automation
      # Docker 레지스트리 호스트 (gcloud auth configure-docker 대상)
      AR_HOST: asia-northeast3-docker.pkg.dev
      # 저장소까지의 경로 — 콘솔 창고: asia-northeast3-docker.pkg.dev/gen-lang-client-0127550748/tax-automation
      AR_DOCKER_REPOSITORY: asia-northeast3-docker.pkg.dev/gen-lang-client-0127550748/tax-automation
      # 같은 이름의 Docker 이미지(패키지) — 풀 URI: .../tax-automation/tax-automation:태그
      DOCKER_IMAGE_NAME: tax-automation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: gen-lang-client-0127550748

      # 이미 활성화돼 있으면 종료 코드 0. SA에 Service Usage 권한이 없어도 실패로 전체 워크플로를 막지 않음.
      - name: GCP API 사용 설정 (Artifact Registry · Cloud Run)
        run: |
          gcloud services enable artifactregistry.googleapis.com run.googleapis.com \
            --project="$GCP_PROJECT_ID" || echo "::notice::services enable 무시(API 이미 활성 또는 권한 부족·콘솔에서 활성 확인)"

      # 저장소 존재 여부는 docker push 결과로 검증(describe 단계에서 Reader/API 이슈로 불필요하게 실패하는 경우 방지).

      # GitHub에 넣은 SA 키(gcp_xxx@PROJECT.iam.gserviceaccount.com) 한 주체로
      # docker push + Cloud Run 배포.
      - name: Docker — 이미지 빌드
        run: |
          set -euo pipefail
          IMAGE_URI="${AR_DOCKER_REPOSITORY}/${DOCKER_IMAGE_NAME}"
          gcloud auth configure-docker "$AR_HOST" --quiet
          echo "빌드 태그: ${IMAGE_URI}:${GITHUB_SHA}"
          docker build --progress=plain -t "${IMAGE_URI}:${GITHUB_SHA}" ./tax-invoice-automation

      - name: Docker — Artifact Registry 푸시
        run: |
          set -euo pipefail
          IMAGE_URI="${AR_DOCKER_REPOSITORY}/${DOCKER_IMAGE_NAME}"
          gcloud auth configure-docker "$AR_HOST" --quiet
          docker push "${IMAGE_URI}:${GITHUB_SHA}" || (
            echo "::error::docker push 실패 — 저장소 $AR_DOCKER_REPOSITORY 및 GitHub Secret GCP_SA_KEY 의 client_email IAM(예: Artifact Registry Writer)을 확인하세요."
            exit 1
          )

      # GitHub Secret 이 비어 있으면 Cloud Run 에 빈 TAX_COLLECT_SECRET 이 올라가므로 배포 전에 차단
      - name: TAX_COLLECT_SECRET 확인
        env:
          TAX_COLLECT_SECRET: ${{ secrets.TAX_COLLECT_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${TAX_COLLECT_SECRET:-}" ]; then
            echo "::error::Repository secret TAX_COLLECT_SECRET 이 비어 있거나 없습니다. GitHub → Settings → Secrets and variables → Actions 에 값을 추가하세요."
            exit 1
          fi
          echo "TAX_COLLECT_SECRET 설정됨(길이: ${#TAX_COLLECT_SECRET}자, 값은 출력하지 않음)"

      # --update-env-vars 를 키마다 반복(한 번에 하나의 KEY=VALUE) — 특수문자·쉼표가 있는 값도 파일 없이 안전하게 병합.
      - name: Cloud Run 배포
        env:
          TAX_COLLECT_SECRET: ${{ secrets.TAX_COLLECT_SECRET }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          import subprocess
          import sys

          repo = os.environ["AR_DOCKER_REPOSITORY"].rstrip("/")
          name = os.environ["DOCKER_IMAGE_NAME"]
          sha = os.environ["GITHUB_SHA"]
          image = f"{repo}/{name}:{sha}"

          tax_collect = os.environ.get("TAX_COLLECT_SECRET") or ""
          if not tax_collect.strip():
              print(
                  "::error::TAX_COLLECT_SECRET 비어 있음 — 이전 단계(TAX_COLLECT_SECRET 확인)를 통과할 수 없습니다.",
                  file=sys.stderr,
              )
              sys.exit(1)

          env_updates = {
              "TAX_COLLECT_SECRET": tax_collect.strip(),
              "TAX_EMAIL_SINCE_MIN": "2026-04-10",
              "TAX_INVOICE_SUBJECT_STRICT": "true",
              "TAX_SCHEDULE_INTERVAL_MINUTES": "60",
              "TAX_MAIL_LOOKBACK_DAYS": "30",
              "TAX_REQUIRE_ETAX_OR_NTS_SIGNAL": "true",
          }

          cmd = [
              "gcloud",
              "run",
              "deploy",
              os.environ["CLOUD_RUN_SERVICE"],
              "--image",
              image,
              "--region",
              os.environ["AR_REGION"],
              "--project",
              os.environ["GCP_PROJECT_ID"],
              "--platform",
              "managed",
              "--allow-unauthenticated",
              "--memory",
              "2Gi",
              "--cpu",
              "2",
              "--timeout",
              "3600s",
              "--concurrency",
              "1",
              "--min-instances",
              "1",
              "--max-instances",
              "1",
          ]
          for k, v in env_updates.items():
              cmd.extend(["--update-env-vars", f"{k}={v}"])

          print("gcloud run deploy:", os.environ["CLOUD_RUN_SERVICE"], "— env keys:", list(env_updates.keys()))
          subprocess.run(cmd, check=True)
          PY

      - name: Cloud Run 배포 주소 확인
        id: cloudrun_url
        run: |
          set -e
          URL="$(gcloud run services describe "${CLOUD_RUN_SERVICE}" \
            --region="$AR_REGION" \
            --project="$GCP_PROJECT_ID" \
            --format='value(status.url)')"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          {
            echo "### Cloud Run \`${CLOUD_RUN_SERVICE}\`"
            echo "- **실제 주소(URL):** \`${URL}\`"
            echo ""
            echo "**Vercel** · Production 환경 변수에 아래 둘(또는 서버만 \`TAX_AUTOMATION_URL\`)을 동일 값으로 넣은 뒤 재배포하세요:"
            echo "- \`TAX_AUTOMATION_URL\` (서버 **/api/tax-run** 권장)"
            echo "- \`VITE_TAX_AUTOMATION_URL\` (클라이언트 참조용, 선택)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cloud Run 헬스 체크 (/api/health)
        env:
          CR_URL: ${{ steps.cloudrun_url.outputs.url }}
        run: |
          set -euo pipefail
          U="${CR_URL}/api/health"
          echo "GET $U"
          code="$(curl -sS -o /tmp/h.json -w '%{http_code}' --max-time 60 "$U" || true)"
          echo "HTTP $code"
          cat /tmp/h.json
          echo ""
          if [ "$code" != "200" ]; then
            echo "::error::헬스 체크 실패 (HTTP $code)"
            exit 1
          fi
          python3 - <<'PY'
          import json, sys
          with open("/tmp/h.json", encoding="utf-8") as f:
              d = json.load(f)
          if d.get("status") != "ok":
              print("::error::JSON status is not ok:", d, file=sys.stderr)
              sys.exit(1)
          PY

      # VERCEL_TOKEN 없이도 Hook 만으로 Production 재빌드 (홈은 Vercel 단일)
      - name: Vercel Deploy Hook (선택·토큰 불필요)
        continue-on-error: true
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "${VERCEL_DEPLOY_HOOK:-}" ]; then
            echo "::notice::VERCEL_DEPLOY_HOOK 없음 — deploy-vercel.yml 또는 Vercel Git 연동으로 배포하세요."
            exit 0
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"
          echo ""
          echo "OK — Vercel Production 배포 트리거됨 (Cloud Run 반영 후 사이트 갱신)"

      # if: 에서 secrets 를 직접 쓸 수 없어, 출력으로 게이팅 (Unrecognized named-value: 'secrets' 방지)
      - name: Vercel 동기화 여부 게이트
        id: vercel_gate
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      # GitHub에 VERCEL_TOKEN + VERCEL_PROJECT_ID(및 선택 VERCEL_TEAM_ID) 추가 시 동기화
      # 선택 단계 오류(API 401·403 등)가 전체 job 을 깨면 안 되므로 continue-on-error
      - name: Vercel 환경 변수 동기화 (선택)
        id: vercel_sync
        if: steps.vercel_gate.outputs.ready == 'true'
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          CR_URL: ${{ steps.cloudrun_url.outputs.url }}
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          python3 << 'PY'
          import json, os, urllib.error, urllib.parse, urllib.request

          token = os.environ["VERCEL_TOKEN"]
          proj = os.environ["VERCEL_PROJECT_ID"]
          team = (os.environ.get("VERCEL_TEAM_ID") or "").strip()
          base_url = os.environ["CR_URL"].strip().rstrip("/")
          hook = (os.environ.get("VERCEL_DEPLOY_HOOK") or "").strip()

          def team_q() -> str:
              return ("?" + urllib.parse.urlencode({"teamId": team})) if team else ""

          def api(method: str, path: str, body=None):
              url = f"https://api.vercel.com{path}{team_q()}"
              data = None if body is None else json.dumps(body).encode()
              req = urllib.request.Request(url, data=data, method=method)
              req.add_header("Authorization", f"Bearer {token}")
              req.add_header("User-Agent", "segye-logis-deploy")
              if body is not None:
                  req.add_header("Content-Type", "application/json")
              ctx = urllib.request.ssl.create_default_context()
              with urllib.request.urlopen(req, context=ctx, timeout=120) as r:
                  return r.read()

          pj = urllib.parse.quote(proj, safe="@")
          keys_touch = {"TAX_AUTOMATION_URL", "VITE_TAX_AUTOMATION_URL"}
          raw = api("GET", f"/v9/projects/{pj}/env").decode()
          envlist = json.loads(raw).get("envs") or []
          ids = [(e["id"], e["key"]) for e in envlist if e.get("key") in keys_touch]

          # 기존 항목 제거 후 동일 값으로 재등록(production · preview 타깃 공통 한 건으로 생성)
          for env_id, k in ids:
              try:
                  eid = urllib.parse.quote(env_id, safe="@")
                  api("DELETE", f"/v9/projects/{pj}/env/{eid}")
              except urllib.error.HTTPError as e:
                  print(f"DELETE {k} 경고:", e.code, e.read().decode()[:400])

          payload = {
              "key": "TAX_AUTOMATION_URL",
              "value": base_url,
              "type": "encrypted",
              "target": ["production", "preview", "development"],
          }
          api("POST", f"/v10/projects/{pj}/env", payload)
          payload2 = dict(payload)
          payload2["key"] = "VITE_TAX_AUTOMATION_URL"
          payload2["value"] = base_url
          api("POST", f"/v10/projects/{pj}/env", payload2)

          print(f"OK — Vercel env TAX_AUTOMATION_URL/VITE_TAX_AUTOMATION_URL = {base_url}")

          if hook:
              uh = urllib.request.Request(hook, data=b"", method="POST")
              urllib.request.urlopen(uh, timeout=60).read()
              print("OK — DEPLOY_HOOK invoked for redeploy")
          else:
              print("(VERCEL_DEPLOY_HOOK 없음) Vercel 대시보드에서 Production 재배포를 한 번 실행하세요.")

          print("See also: https://vercel.com/docs/rest-api/endpoints#create-one-or-more-environment-variables")
          PY

      - name: Vercel 수동 설정 안내 (시크릿 없을 때)
        if: steps.vercel_gate.outputs.ready != 'true'
        env:
          CR_URL: ${{ steps.cloudrun_url.outputs.url }}
        run: |
          echo "::notice::VERCEL_TOKEN + VERCEL_PROJECT_ID GitHub Secrets 를 넣으면 다음 배포부터 위 주소가 Vercel에 자동 반영됩니다."
          echo ""
          echo "지금 즉시는 Vercel → Project → Settings → Environment Variables 에서 다음을 확인하세요:"
          echo "  TAX_AUTOMATION_URL = ${CR_URL}"
          echo "  VITE_TAX_AUTOMATION_URL = ${CR_URL}"
          echo "값 저장 후 Deployments 에서 Redeploy."
