name: Deploy to Cloud Run

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Cloud Build SA([PROJECT]@cloudbuild.gserviceaccount.com)에
      # Artifact Registry tax-automation 저장소 Writer 권한이 있어야 푸시됩니다.
      - name: Cloud Build — Docker 이미지 빌드 및 AR 푸시
        run: |
          set -e
          IMG=asia-northeast3-docker.pkg.dev/gen-lang-client-0127550748/tax-automation/tax-automation
          gcloud builds submit ./tax-invoice-automation \
            --tag ${IMG}:${{ github.sha }} \
            --tag ${IMG}:latest \
            --project=gen-lang-client-0127550748 \
            --timeout=1200s

      - name: Cloud Run 배포
        env:
          TAX_COLLECT_SECRET: ${{ secrets.TAX_COLLECT_SECRET }}
        run: |
          set -e
          IMG=asia-northeast3-docker.pkg.dev/gen-lang-client-0127550748/tax-automation/tax-automation
          gcloud run deploy tax-automation \
            --image ${IMG}:${{ github.sha }} \
            --region=asia-northeast3 \
            --project=gen-lang-client-0127550748 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=2Gi \
            --cpu=2 \
            --timeout=3600s \
            --concurrency=1 \
            --min-instances=1 \
            --max-instances=1 \
            --set-env-vars="TAX_COLLECT_SECRET=${TAX_COLLECT_SECRET}"
