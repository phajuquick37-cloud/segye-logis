version: "3.9"

services:
  tax-invoice-bot:
    build: .
    container_name: segyelogis_tax_bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Seoul
      - PYTHONUNBUFFERED=1
    volumes:
      # 서비스 계정 키 (필수 - 서버에 파일 배치 후 경로 수정)
      - ./google_credentials.json:/app/google_credentials.json:ro
      # 스크린샷 및 출력 파일 영구 보존
      - ./output:/app/output
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # (선택) Nginx 리버스 프록시 - 도메인 연결 시
