<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세계로지스 플로팅 버튼</title>
  <style>
    /* =============================================
       이 코드를 고객사 인트라넷 HTML에 붙여넣으세요
       ============================================= */

    .segye-float-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 110px;
      padding: 14px 10px 12px;
      background: #ffffff;
      border: 2.5px solid #1e3a5f;
      border-radius: 18px;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(30,58,95,0.22), 0 2px 8px rgba(0,0,0,0.10);
      transition: all 0.22s cubic-bezier(.34,1.56,.64,1);
      animation: floatIn 0.7s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(40px) scale(0.85); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .segye-float-btn:hover {
      background: #fff7f4;
      border-color: #e8420a;
      box-shadow: 0 12px 36px rgba(232,66,10,0.28), 0 4px 12px rgba(0,0,0,0.10);
      transform: translateY(-6px) scale(1.06);
    }

    .segye-float-btn:active {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 4px 14px rgba(30,58,95,0.18);
    }

    .segye-float-btn img {
      width: 78px;
      height: auto;
      pointer-events: none;
    }

    .segye-float-btn .btn-label {
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      font-size: 11.5px;
      font-weight: 700;
      color: #1e3a5f;
      letter-spacing: -0.3px;
      text-align: center;
      line-height: 1.5;
      pointer-events: none;
    }

    .segye-float-btn:hover .btn-label {
      color: #e8420a;
    }

    /* 빨간 점 (NEW 표시) */
    .segye-float-btn .badge {
      position: absolute;
      top: -7px;
      right: -7px;
      width: 20px;
      height: 20px;
      background: #e8420a;
      border-radius: 50%;
      border: 2.5px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Malgun Gothic', sans-serif;
      font-size: 8px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(232,66,10,0.5); }
      50%       { transform: scale(1.15); box-shadow: 0 0 0 6px rgba(232,66,10,0); }
    }

    /* 미리보기용 배경 (실제 인트라넷에 붙일 땐 아래 body 스타일 제거) */
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #e8edf5 0%, #f5f7fa 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-msg {
      font-family: 'Malgun Gothic', sans-serif;
      font-size: 15px;
      color: #7a8a9e;
      text-align: center;
      line-height: 2;
    }
    .preview-msg strong { color: #1e3a5f; }
  </style>
</head>
<body>
